<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado con gradiente morado→azul -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Hélice ADN - cadena izquierda (S-curve) -->
  <path d="M 32 8 C 48 16 48 24 32 32 C 16 40 16 48 32 56"
    fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Hélice ADN - cadena derecha (S-curve invertida) -->
  <path d="M 32 8 C 16 16 16 24 32 32 C 48 40 48 48 32 56"
    fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Peldaño superior (y≈20) -->
  <line x1="44" y1="20" x2="20" y2="20" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Peldaño inferior (y≈44) -->
  <line x1="20" y1="44" x2="44" y2="44" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Nodos extremos -->
  <circle cx="32" cy="8"  r="3.5" fill="white"/>
  <circle cx="32" cy="56" r="3.5" fill="white"/>
  <!-- Nodo central (cruce de hebras) -->
  <circle cx="32" cy="32" r="2.5" fill="white" opacity="0.85"/>
</svg>